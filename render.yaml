services:
  - type: web
    name: zyra
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: FLASK_SECRET
        generateValue: true
      - key: MCQ_USE_OLLAMA
        value: "false"
      - key: MONGO_DB
        value: zyra_db
      - key: UPLOAD_FOLDER
        value: uploads
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: MCQ_QUESTION_COUNT
        value: "20"
      - key: VIRTUAL_QUESTION_COUNT
        value: "15"
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_MCQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_TEXT_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_EVAL_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_INTERVIEW_TEMP
        value: "0.7"
      - key: GROQ_MAX_TOKENS
        value: "900"
      - key: DID_BASE_URL
        value: https://api.d-id.com
      - key: DID_AVATAR_SOURCE_URL
        value: https://create-images-results.d-id.com/DefaultPresenters/Noelle_f/image.png
      - key: DID_VOICE_PROVIDER
        value: microsoft
      - key: DID_VOICE_ID
        value: en-US-JennyNeural
      - key: DID_TALK_TIMEOUT_SECONDS
        value: "60"
      - key: CLOUDINARY_FOLDER
        value: zyra/resumes
      - key: MAX_VIOLATIONS_ALLOWED
        value: "3"
      - key: MAX_LOGIN_ATTEMPTS
        value: "3"
      - key: ADAPTIVE_DIFFICULTY_ENABLED
        value: "true"
      - key: RECORD_VIDEO_PROCTORING
        value: "true"
      - key: DEMO_CANDIDATE_USERNAME
        value: demo
      - key: DEMO_CANDIDATE_EMAIL
        value: demo.candidate@zyra.local
      - key: DEMO_ALWAYS_PROMOTE
        value: "true"
      - key: DEMO_PERSIST_TEST_DATA
        value: "false"
      - key: DEMO_LOGIN_LIMIT
        value: "999999"
      - key: HF_TOKEN
        sync: false
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false
      - key: MONGO_URI
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: DID_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DEMO_CANDIDATE_PASSWORD
        sync: false
